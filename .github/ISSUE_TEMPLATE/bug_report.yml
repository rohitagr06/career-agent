name: Bug Report
description: Report an unexpected bug or issue
title: "[Bug]: "
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clearly describe the issue.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run...
        2. Ask...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Paste relevant logs or errors here.

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.11

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15