name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the problem...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Which part of the project is affected?
      options:
        - rag
        - pipeline
        - core
        - prompts
        - ui
        - tests
        - docs
        - ci/cd

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      placeholder: Add extra notes, screenshots, references, etc.